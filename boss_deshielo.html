<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Veyron OS - Boss Fight Final</title>
<style>
    body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
    #game-container { 
        position: relative; width: 1000px; height: 600px; 
        background: #333; margin: 20px auto; border: 4px solid #00eaff; overflow: hidden; 
        background-size: cover; background-position: center;
    }
    #hud { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; display: none; z-index: 100; }
    .bar-container { width: 150px; height: 15px; background: #111; border: 1px solid #fff; position: relative; }
    #hp-veyron-bar { height: 100%; background: #00ff00; width: 100%; transition: width 0.2s; }
    #hp-morbos-bar { height: 100%; background: red; width: 100%; transition: width 0.2s; }
    #hp-cube-bar { height: 100%; background: #00eaff; width: 100%; transition: width 0.2s; }

    #veyron { position: absolute; width: 50px; height: 60px; background: url('veyron.png') no-repeat; background-size: 200px 60px; display: none; z-index: 50; image-rendering: pixelated; }
    #morbos { position: absolute; width: 120px; height: 160px; background: url('morbos.png') no-repeat; background-size: 240px 160px; display: none; z-index: 40; image-rendering: pixelated; }
    #magic-cube { position: absolute; width: 60px; height: 60px; background: url('cubo_magico.png') no-repeat; background-size: cover; left: 880px; bottom: 250px; display: none; z-index: 30; }

    .projectile { position: absolute; background-size: contain; background-repeat: no-repeat; z-index: 60; }
    .fire { width: 30px; height: 30px; background-image: url('fuego.png'); }
    .spear-right { width: 45px; height: 15px; background-image: url('lanzad.png'); }
    .spear-left { width: 45px; height: 15px; background-image: url('lanzai.png'); }
    .ice { width: 30px; height: 30px; background-image: url('hielo.png'); }

    #story-box { position: absolute; bottom: 0; width: 100%; text-align: center; color: #fff; font-size: 22px; background: rgba(0,0,0,0.85); padding: 25px 0; z-index: 200; border-top: 2px solid #00eaff; }
</style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div>VEYRON HP:<div class="bar-container"><div id="hp-veyron-bar"></div></div></div>
        <div>MORBOS HP:<div class="bar-container"><div id="hp-morbos-bar"></div></div></div>
        <div>CUBO HP:<div class="bar-container"><div id="hp-cube-bar"></div></div></div>
    </div>
    <div id="story-box">Presiona [E] para comenzar...</div>
    <div id="veyron"></div>
    <div id="morbos"></div>
    <div id="magic-cube"></div>
</div>

<script>
let gameState = 'intro'; 
let sceneIdx = 0;

const introScenes = [
    { img: 'escena1.png', text: 'Veyron fue absorbido por una tormenta de nieve...' },
    { img: 'escena2.png', text: 'Una pirita le otorgó el poder del fuego...' },
    { img: 'escena3.png', text: 'Un nómada le entrega una lanza infinita...' },
    { img: 'escena3.png', text: 'MORBOS: ¡Insolente! ¡Mi Cubo congelará tus huesos!' }
];

const endingScenes = [
    { img: 'escena4.png', text: '¡Morbos ha sido derrotado! El Cubo se rompe en mil pedazos...' },
    { img: 'escena5.png', text: 'La tierra se abre bajo sus pies y Morbos cae al abismo...' },
    { img: 'escena6.png', text: 'El hielo se derrite... la vida regresa a Veyron OS. [E para continuar]' }
];

const keys = {};
let active = false;
const v = { x: 50, y: 490, vy: 0, hp: 100, jumping: false, ducking: false, dir: 'right', w: 40, h: 60 };
let m = { x: 650, y: 390, vy: 0, vx: 0, hp: 100, vulnerable: false, w: 100, h: 140 };
let cubeHP = 100;
let projectiles = [];
let morbosTimer = 0;
const morbosIntervalTime = 1600;

function handleE() {
    if (gameState === 'intro') {
        if (sceneIdx < introScenes.length) renderScene(introScenes[sceneIdx++]);
        else startBattle();
    } else if (gameState === 'ending') {
        if (sceneIdx < endingScenes.length) renderScene(endingScenes[sceneIdx++]);
        else window.location.href = "era_de_hielo.html";
    }
}

function renderScene(scene) {
    const container = document.getElementById('game-container');
    const box = document.getElementById('story-box');
    container.style.backgroundImage = `url('${scene.img}')`;
    box.innerText = scene.text + " [E]";
    box.style.display = 'block';
}

function startBattle() {
    gameState = 'battle';
    active = true;
    document.getElementById('story-box').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('veyron').style.display = 'block';
    document.getElementById('morbos').style.display = 'block';
    document.getElementById('magic-cube').style.display = 'block';
    document.getElementById('game-container').style.backgroundImage = "none";
    document.getElementById('game-container').style.backgroundColor = "#333";
    v.hp = 100; m.hp = 100; cubeHP = 100; m.vulnerable = false; projectiles = [];
    document.getElementById('hp-veyron-bar').style.width = v.hp + '%';
    document.getElementById('hp-morbos-bar').style.width = m.hp + '%';
    document.getElementById('hp-cube-bar').style.width = cubeHP + '%';
    morbosTimer = 0;
}

function checkBattleEnd() {
    if (cubeHP <= 0) startEnding();
}

function startEnding() {
    active = false;
    gameState = 'ending';
    sceneIdx = 0;

    // --- REGISTRO DE VICTORIA ---
    localStorage.setItem('boss_deshielo', 'completado');

    document.getElementById('hud').style.display = 'none';
    document.getElementById('veyron').style.display = 'none';
    document.getElementById('morbos').style.display = 'none';
    document.getElementById('magic-cube').style.display = 'none';
    projectiles = [];
    handleE();
}

function morbosAI(delta) {
    if (!active || m.vulnerable) return;
    morbosTimer += delta;
    if (morbosTimer >= morbosIntervalTime) {
        morbosTimer = 0;
        let dir = (v.x < m.x) ? -1 : 1;
        m.vx = dir * 2.5;
        if (Math.random() < 0.4 && m.y >= 390) m.vy = -14;
        projectiles.push({ x: m.x + 40, y: m.y + 70, vx: dir * 7, vy: 0, type: 'ice' });
    }
}

let lastTime = 0;
function loop(time) {
    let delta = time - lastTime;
    lastTime = time;
    if (active) {
        let nextX = v.x;
        if (keys['arrowleft']) { nextX -= 6; v.dir = 'left'; }
        if (keys['arrowright']) { nextX += 6; v.dir = 'right'; }
        if (!rectHit(nextX, v.y, v.w, v.h, m.x, m.y, m.w, m.h)) v.x = nextX;
        if (keys['arrowup'] && !v.jumping) { v.vy = -15; v.jumping = true; }
        v.ducking = keys['arrowdown'] && !v.jumping;
        v.y += v.vy; v.vy += 0.8;
        if (v.y >= 490) { v.y = 490; v.jumping = false; v.vy = 0; }
        m.x += m.vx; m.y += m.vy; m.vy += 0.7;
        if (m.y >= 390) { m.y = 390; m.vy = 0; }
        v.x = Math.max(0, Math.min(950, v.x));
        m.x = Math.max(0, Math.min(880, m.x));
        for (let i = projectiles.length - 1; i >= 0; i--) {
            let p = projectiles[i];
            p.x += p.vx; p.y += p.vy;
            if (p.type.includes('spear')) p.vy += 0.15;
            if (rectHit(v.x, v.y, v.w, v.h, p.x, p.y, 20, 20) && p.type === 'ice') {
                v.hp -= 5;
                document.getElementById('hp-veyron-bar').style.width = Math.max(0, v.hp) + '%';
                projectiles.splice(i, 1);
                if (v.hp <= 0) location.reload();
            }
            if (p.type === 'fire' || p.type.includes('spear')) {
                if (rectHit(m.x, m.y, m.w, m.h, p.x, p.y, 25, 25)) {
                    if (!m.vulnerable) {
                        m.hp -= (p.type === 'fire' ? 6 : 12);
                        document.getElementById('hp-morbos-bar').style.width = Math.max(0, m.hp) + '%';
                        if (m.hp <= 25) { m.hp = 25; m.vulnerable = true; m.vx = 0; }
                    }
                    projectiles.splice(i, 1);
                    continue;
                }
                if (rectHit(880, 290, 60, 60, p.x, p.y, 25, 25)) {
                    cubeHP -= (m.vulnerable ? 20 : 2); 
                    document.getElementById('hp-cube-bar').style.width = Math.max(0, cubeHP) + '%';
                    projectiles.splice(i, 1);
                    checkBattleEnd();
                    continue;
                }
            }
        }
        if (m.vulnerable) {
            m.hp += 0.15;
            document.getElementById('hp-morbos-bar').style.width = m.hp + '%';
            if (m.hp >= 100) { m.hp = 100; m.vulnerable = false; }
        }
        morbosAI(delta);
        updateVisuals();
    }
    requestAnimationFrame(loop);
}

function updateVisuals() {
    const vEl = document.getElementById('veyron');
    const mEl = document.getElementById('morbos');
    let frame = (v.dir === 'left') ? 2 : 0;
    if (v.ducking) frame += 1;
    vEl.style.backgroundPosition = `-${frame * 50}px 0px`;
    vEl.style.left = v.x + 'px';
    vEl.style.top = v.y + (v.ducking ? 25 : 0) + 'px';
    mEl.style.transform = (v.x > m.x) ? "scaleX(1)" : "scaleX(-1)";
    mEl.style.left = m.x + 'px'; mEl.style.top = m.y + 'px';
    document.querySelectorAll('.projectile').forEach(p => p.remove());
    projectiles.forEach(p => {
        const d = document.createElement('div');
        d.className = 'projectile ' + p.type;
        d.style.left = p.x + 'px'; d.style.top = p.y + 'px';
        document.getElementById('game-container').appendChild(d);
    });
}

window.onkeydown = e => {
    const k = e.key.toLowerCase();
    keys[k] = true;
    if (k === 'e') handleE();
    if (active) {
        if (k === ' ') {
            let r = v.dir === 'right';
            projectiles.push({ x: r?v.x+40:v.x-20, y: v.y+25, vx: r?11:-11, vy:0, type:'fire' });
        }
        if (k === 'f') {
            let r = v.dir === 'right';
            projectiles.push({ x: r?v.x+45:v.x-45, y: v.y+15, vx: r?14:-14, vy:-3, type: r?'spear-right':'spear-left' });
        }
    }
};
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
function rectHit(x1, y1, w1, h1, x2, y2, w2, h2) { return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2; }
handleE(); 
loop(0);
</script>
</body>
</html>
